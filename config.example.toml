# Kook 音乐机器人配置文件
# 复制此文件为 config.toml 并修改相关配置

# ============================================
# 基础配置 (必需)
# ============================================

# Kook Bot Token (必需)
# 从 Kook 开发者平台获取: https://developer.kookapp.cn/app/index
token = "你的 Bot Token"

# 连接模式: websocket 或 webhook (默认: websocket)
mode = "websocket"

# 命令前缀 (默认: /)
prefix = "/"

# ============================================
# Webhook 模式配置 (仅 webhook 模式需要)
# ============================================

[webhook]
# 监听地址 (默认: 0.0.0.0)
host = "0.0.0.0"

# 监听端口 (默认: 8080)
port = 8080

# 回调路径 (默认: /webhook)
path = "/webhook"

# 验证令牌 (webhook 模式必需，从 Kook 开发者平台获取)
verify_token = "你的验证令牌"

# ============================================
# 音频配置
# ============================================

[audio]
# 默认音量 (0.0 - 1.0) (默认: 0.5)
volume = 0.5

# 比特率 (bps) (默认: 128000 = 128kbps)
# Kook 支持: 16000, 32000, 64000, 96000, 128000
bit_rate = 128000

# ============================================
# 网络配置
# ============================================

[network]
# 连接超时(秒) (默认: 30)
timeout = 30

# ============================================
# 音乐源配置
# ============================================

[music]
# 音乐缓存目录 (默认: ./cache)
cache_dir = "./cache"

# 最大缓存大小 MB (默认: 1024)
# 超过此限制会自动删除最旧的缓存文件
max_cache_size_mb = 1024

# 网易云音乐 API 地址 (必需)
# 使用 NeteaseCloudMusicApi 项目: https://github.com/Binaryify/NeteaseCloudMusicApi
netease_api_url = "http://localhost:3000"

# 网易云音乐 Cookie (如果需要登录获取更多歌曲信息或下载受限歌曲)
netease_cookie = ""

# ============================================
# 播放器配置
# ============================================

[player]
# 最大队列长度 (默认: 100)
max_queue_size = 100

# 是否允许重复歌曲 (默认: false)
allow_duplicates = false

# 预加载数量 (默认: 2)
preload_count = 2
