# Kook 音乐机器人配置文件
# 复制此文件为 config.toml 并修改相关配置

# ============================================
# 基础配置 (必需)
# ============================================

# Kook Bot Token
# 从 Kook 开发者平台获取: https://developer.kookapp.cn/app/index
token = "1/MjI2ODk=/KrB0f5MlUhMXPlSsuPdKig=="

# 连接模式: websocket 或 webhook
mode = "websocket"

# 命令前缀
prefix = "/"

# 管理员 ID 列表
admins = ["你的用户ID"]

# ============================================
# WebSocket 模式配置
# ============================================

[websocket]
# 心跳间隔(秒)
heartbeat_interval = 30

# 是否启用压缩
compress = true

# 重连尝试次数
reconnect_attempts = 5

# 重连延迟(秒)
reconnect_delay = 5

# ============================================
# Webhook 模式配置
# ============================================

[webhook]
# 监听地址
host = "0.0.0.0"

# 监听端口
port = 8080

# 回调路径
path = "/webhook"

# 验证令牌 (从 Kook 开发者平台获取)
verify_token = "你的验证令牌"

# 加密密钥 (可选，用于解密消息)
# encrypt_key = ""

# 是否启用 SSL
use_ssl = false

# SSL 证书路径 (use_ssl = true 时需要)
# cert_path = "/path/to/cert.pem"

# SSL 密钥路径 (use_ssl = true 时需要)
# key_path = "/path/to/key.pem"

# ============================================
# 音频配置
# ============================================

[audio]
# 默认音量 (0.0 - 1.0)
volume = 0.5

# 比特率 (bps)
# Kook 支持: 16000, 32000, 64000, 96000, 128000
bit_rate = 64000

# 采样率 (Kook 只支持 48000)
sample_rate = 48000

# 声道数 (1=单声道, 2=立体声)
channels = 2

# ============================================
# 网络配置
# ============================================

[network]
# 连接超时(秒)
timeout = 30

# 重试次数
retries = 3

# RTP 包大小
packet_size = 1200

# HTTP 代理 (可选)
# http_proxy = "http://127.0.0.1:7890"

# HTTPS 代理 (可选)
# https_proxy = "http://127.0.0.1:7890"

# ============================================
# 音乐源配置
# ============================================

