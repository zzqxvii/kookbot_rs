# Kook 音乐机器人配置文件

# ============================================
# 基础配置 (必需)
# ============================================

# Kook Bot Token
# 从 Kook 开发者平台获取: https://developer.kookapp.cn/app/index
token = "1/MjI2ODk=/KrB0f5MlUhMXPlSsuPdKig=="

# 连接模式: websocket 或 webhook
mode = "websocket"

# 命令前缀
prefix = "/"

# ============================================
# Webhook 模式配置 (仅 webhook 模式需要)
# ============================================

[webhook]
# 监听地址
host = "0.0.0.0"

# 监听端口
port = 8080

# 回调路径
path = "/webhook"

# 验证令牌 (从 Kook 开发者平台获取)
verify_token = "你的验证令牌"

# ============================================
# 音频配置
# ============================================

[audio]
# 默认音量 (0.0 - 1.0)
volume = 0.5

# 比特率 (bps)
# Kook 支持: 16000, 32000, 64000, 96000, 128000
bit_rate = 128000

# ============================================
# 网络配置
# ============================================

[network]
# 连接超时(秒)
timeout = 30

# ============================================
# 音乐源配置
# ============================================

[music]
# 音乐缓存目录
cache_dir = "./cache"

# 网易云音乐 API 地址
netease_api_url = "http://localhost:3000"

# 网易云音乐 Cookie (可选，用于更高音质)
netease_cookie = "MUSIC_A_T=1433396719000; MUSIC_SNS=; MUSIC_A_T=1433396719000; NMTID=00OZXJtwQ8C03nHpEV2lnhj6i6Uc8kAAAGcdD7hNg; MUSIC_R_T=1436526752823; MUSIC_A_T=1433396719000; MUSIC_R_T=1436526752823; MUSIC_R_T=1436526752823; MUSIC_; MUSIC_A_T=1433396719000; MUSIC_R_T=1436526752823; MUSIC_R_T=1436526752823; MUSIC_A_T=1433396719000; MUSIC_A_T=1433396719000; MUSIC_R_T=1436526752823; MUSIC_R_T=1436526752823; MUSIC_A_T=1433396719000; MUSIC_A_T=1433396719000; MUSIC_R_T=1436526752823; MUSIC_R_T=1436526752823; MUSIC_R_T=1436526752823; MUSIC_R_T=1436526752823; __csrf=045215e9293574a50192090a06e43707; MUSIC_A_T=1433396719000; MUSIC_A_T=1433396719000; MUSIC_A_T=1433396719000"

# ============================================
# 播放器配置
# ============================================

[player]
