# 音乐缓存目录
cache_dir = "./cache"

# 最大缓存大小(MB)
max_cache_size = 1024

# 网易云音乐 Cookie (可选，用于更高音质)
# netease_cookie = "MUSIC_U=..."

# QQ 音乐 Cookie (可选)
# qqmusic_cookie = "uin=..."

# Bilibili Cookie (可选)
# bilibili_cookie = "SESSDATA=..."

# ============================================
# 播放器配置
# ============================================

[player]
# 最大队列长度
max_queue_size = 100

# 是否允许重复歌曲
allow_duplicates = false

# 自动播放
autoplay = true

# 随机播放
shuffle = false

# 预加载数量
preload_count = 2

# ============================================
# 日志配置
# ============================================

[log]
# 日志级别: trace, debug, info, warn, error
level = "info"

# 日志文件路径 (可选，不设置则只输出到控制台)
# file = "logs/kook-music-bot.log"

# 是否输出到控制台
console = true

# 日志格式: compact, pretty, json
format = "compact"
