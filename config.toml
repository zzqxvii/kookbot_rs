# Kook 音乐机器人配置文件
# 复制此文件为 config.toml 并修改相关配置

# ============================================
# 基础配置 (必需)
# ============================================

# Kook Bot Token
# 从 Kook 开发者平台获取: https://developer.kookapp.cn/
token = "1/MjI2ODk=/KrB0f5MlUhMXPlSsuPdKig=="

# 命令前缀
prefix = "!"

# 管理员 ID 列表
admins = ["你的用户ID"]

# ============================================
# Kook API 配置
# ============================================

[kook]
# API 基础 URL
api_base = "https://www.kookapp.cn/api/v3"

# WebSocket URL
ws_url = "wss://websocket.kookapp.cn/"

# 心跳间隔(秒)
heartbeat_interval = 30

# 是否使用压缩
compress = true

# ============================================
# 音频配置
# ============================================

[audio]
# 默认音量 (0.0 - 1.0)
volume = 0.5

# 默认比特率 (bps)
# Kook 支持: 16000, 32000, 64000, 96000, 128000
bit_rate = 64000

# 采样率 (Hz)
# Kook 只支持 48000
sample_rate = 48000

# 声道数 (1=单声道, 2=立体声)
channels = 2

# ============================================
# 网络配置
# ============================================

[network]
# 连接超时(秒)
timeout = 30

# 重试次数
retries = 3

# RTP 包大小
packet_size = 1200

# HTTP 代理 (可选)
# http_proxy = "http://127.0.0.1:7890"

# HTTPS 代理 (可选)
# https_proxy = "http://127.0.0.1:7890"

# ============================================
# 音乐源配置
# ============================================

[music_source]
# 网易云音乐 Cookie (可选)
# 用于获取更高音质的音乐
# netease_cookie = "MUSIC_U=..."

# QQ 音乐 Cookie (可选)
# qqmusic_cookie = "uin=..."

# Bilibili SESSDATA (可选)
# 用于获取 B 站音频
# bilibili_sessdata = "..."

# 音乐缓存目录
cache_dir = "./cache"

# 最大缓存大小(MB)
max_cache_size = 1024

# ============================================
# 播放队列配置
# ============================================

[queue]
# 最大队列长度
max_size = 100

# 是否允许重复歌曲
allow_duplicates = false

# 自动播放
autoplay = true

# 随机播放
shuffle = false

# ============================================
# 日志配置
# ============================================

[log]
# 日志级别: trace, debug, info, warn, error
level = "info"

# 日志文件路径 (可选，默认输出到控制台)
# file = "logs/kook-music-bot.log"

# 是否输出到控制台
console = true

# 日志格式: compact, pretty, json
format = "compact"
